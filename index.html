<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tietokonehuolto</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

/* KOKO SIVU GRID */
.main {
    display: grid;
    grid-template-columns: 2fr 1fr; /* vasen isompi */
    gap: 20px;
    padding: 20px;
}

/* YLÄOSA */
.header {
    grid-column: 1 / 3; /* vie koko leveys */
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
}

/* YLEINEN LAATIKKO */
.box {
    border: 2px solid white;
    padding: 20px;
}

/* NAPIT */
.buttons {
    grid-column: 1 / 3;
    display: flex;
    gap: 10px;
}

.button {
    padding: 10px;
    border: 2px solid white;
}
</style>

</head>

<body>

<div class="main">

    <!-- HEADER -->
    <div class="header">
        <div class="box">
            <h1>Otsikko</h1>
            <p>Osoite</p>
        </div>

        <div>
            <div class="box">Puhelin</div>
            <div class="box">Sähköposti</div>
        </div>

        <div class="buttons">
            <div class="button">Palvelu</div>
            <div class="button">Palvelu</div>
            <div class="button">Palvelu</div>
            <div class="button">Palvelu</div>
        </div>
    </div>

    <!-- VASEN -->
    <div class="box">
        <h2>Yleistä tietoa</h2>
        <p>Leipätekstiä tähän</p>
    </div>

    <!-- OIKEA -->
    <div class="box">
        <h2>Yhteydenotto</h2>
        <p>Yks tapa</p>
        <p>Toinen tapa</p>
    </div>

    <!-- ALA VASEN -->
    <div class="box">
        <h2>Hinnasto</h2>
    </div>

    <!-- ALA OIKEA -->
    <div class="box">
        <h2>Lisätietoa</h2>
    </div>

</div>

</body>
</html>
